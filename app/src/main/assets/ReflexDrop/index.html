<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Reflex Drop V5</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="app">

<header id="topBar">
<h1>REFLEX DROP</h1>
<p id="tagline">Titan Edition ⚡</p>
</header>

<section id="statsBar">
<div class="statBox">
<span class="label">Score</span>
<span id="score">0</span>
</div>

<div class="statBox">
<span class="label">Combo</span>
<span id="combo">0</span>
</div>

<div class="statBox">
<span class="label">Coins</span>
<span id="coins">0</span>
</div>
</section>

<section id="menu">

<button onclick="startGame()">PLAY</button>

<button onclick="openStory()">STORY MODE</button>

<button onclick="openInventory()">INVENTORY</button>

<button onclick="openAchievements()">ACHIEVEMENTS</button>

<button onclick="openStore()">STORE</button>

</section>

<section id="arena"></section>

<section id="gameOver" class="hidden">
<h2>GAME OVER</h2>
<p id="summary">Nice run.</p>

<button onclick="startGame()">RETRY</button>
<button onclick="backMenu()">HOME</button>
</section>

</div>

<script src="js/main.js"></script>
<script src="js/game.js"></script>
<script src="js/economy.js"></script>
<script src="js/story.js"></script>
<script src="js/inventory.js"></script>
<script src="js/ui.js"></script>

</body>
</html>
