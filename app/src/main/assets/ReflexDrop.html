<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Reflex Drop</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial,Helvetica,sans-serif;
overflow:hidden;
background:
radial-gradient(circle at top left,#16333f,#0d1117 45%),
radial-gradient(circle at bottom right,#20132d,#0d1117 55%);
color:#fff;
user-select:none;
}

#topbar{
position:fixed;
top:0;
left:0;
right:0;
height:70px;
display:flex;
justify-content:space-evenly;
align-items:center;
background:rgba(0,0,0,.35);
backdrop-filter:blur(10px);
z-index:1000;
}

.stat{
padding:10px 14px;
border-radius:18px;
background:rgba(255,255,255,.08);
font-size:20px;
min-width:92px;
text-align:center;
}

#game{
position:absolute;
top:70px;
left:0;
right:0;
bottom:0;
overflow:hidden;
}

#menu,#gameover,#reflexBanner{
position:fixed;
inset:0;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:2000;
text-align:center;
padding:20px;
}

#menu,#gameover{
background:rgba(8,12,18,.76);
backdrop-filter:blur(12px);
}

.hidden{
display:none !important;
}

h1{
font-size:56px;
line-height:.95;
letter-spacing:2px;
color:#00e7ff;
text-shadow:0 0 20px #00e7ff88;
margin-bottom:18px;
}

.sub{
font-size:22px;
color:#d0d7df;
margin:7px 0;
}

.small{
font-size:18px;
color:#93a1b1;
margin-top:10px;
}

button{
margin-top:24px;
border:none;
padding:18px 42px;
font-size:28px;
font-weight:900;
border-radius:24px;
background:linear-gradient(90deg,#12d8ff,#00ff88);
color:#000;
box-shadow:0 0 25px #00ffd577;
}

button:active{
transform:scale(.96);
}

.floatShape{
position:absolute;
opacity:.12;
animation:drift 8s linear infinite;
}

@keyframes drift{
0%{transform:translateY(0) rotate(0deg);}
100%{transform:translateY(-60px) rotate(180deg);}
}

.shape{
position:absolute;
filter:drop-shadow(0 0 14px rgba(255,255,255,.35));
}

.circle{
width:58px;
height:58px;
border-radius:50%;
background:#ff4a4a;
}

.square{
width:58px;
height:58px;
background:#00ff88;
}

.rect{
width:78px;
height:50px;
border-radius:12px;
background:#ffd83d;
}

.triangle{
width:0;
height:0;
border-left:30px solid transparent;
border-right:30px solid transparent;
border-bottom:56px solid #a45cff;
}

.gold{
width:60px;
height:60px;
border-radius:50%;
background:#ffd700;
box-shadow:0 0 22px #ffd700;
}

.bomb{
width:58px;
height:58px;
border-radius:50%;
background:#111;
border:5px solid #ff2a2a;
}

.comboText{
position:absolute;
font-size:24px;
font-weight:900;
color:#00f0ff;
pointer-events:none;
animation:rise .7s forwards;
}

@keyframes rise{
0%{opacity:1;transform:translateY(0) scale(1);}
100%{opacity:0;transform:translateY(-50px) scale(1.4);}
}

#reflexBanner{
pointer-events:none;
background:rgba(0,255,255,.12);
font-size:58px;
font-weight:900;
color:#00ffff;
text-shadow:0 0 24px #00ffff;
animation:pulse .8s infinite;
}

@keyframes pulse{
50%{transform:scale(1.04);}
}

.shake{
animation:shake .18s;
}

@keyframes shake{
0%{transform:translateX(0);}
25%{transform:translateX(-6px);}
50%{transform:translateX(6px);}
75%{transform:translateX(-4px);}
100%{transform:translateX(0);}
}
</style>
</head>

<body>

<div id="topbar">
<div class="stat">Score: <span id="score">0</span></div>
<div class="stat">Lives: <span id="lives">5</span></div>
<div class="stat">Best: <span id="best">0</span></div>
</div>

<div id="game"></div>

<div id="menu">
<h1>REFLEX<br>DROP</h1>
<div class="sub">Tap falling shapes fast.</div>
<div class="sub">Equal sides = more points.</div>
<div class="small">x5 / x10 combos may trigger REFLEX MODE ⚡</div>
<button onclick="startGame()">PLAY</button>
</div>

<div id="gameover" class="hidden"></div>

<div id="reflexBanner" class="hidden">REFLEX MODE ⚡</div>

<script>
let score=0;
let lives=5;
let best=localStorage.getItem("reflexBest")||0;
let combo=0;
let playing=false;
let spawnLoop;
let levelLoop;
let spawnRate=900;
let speedBoost=0;
let reflex=false;

const game=document.getElementById("game");
const menu=document.getElementById("menu");
const gameover=document.getElementById("gameover");
const reflexBanner=document.getElementById("reflexBanner");

const scoreEl=document.getElementById("score");
const livesEl=document.getElementById("lives");
const bestEl=document.getElementById("best");

bestEl.textContent=best;

function updateUI(){
scoreEl.textContent=score;
livesEl.textContent=lives;
bestEl.textContent=best;
}

function startGame(){
score=0;
lives=5;
combo=0;
spawnRate=900;
speedBoost=0;
playing=true;
game.innerHTML="";
menu.classList.add("hidden");
gameover.classList.add("hidden");
updateUI();

runSpawner();

levelLoop=setInterval(()=>{
if(spawnRate>350) spawnRate-=60;
speedBoost+=0.2;
runSpawner();
},12000);
}

function runSpawner(){
clearInterval(spawnLoop);
spawnLoop=setInterval(spawnShape,spawnRate);
}

function rand(arr){
return arr[Math.floor(Math.random()*arr.length)];
}

function getType(){
let roll=Math.random();

if(roll<0.06) return "gold";
if(roll<0.11) return "bomb";

return rand(["circle","square","triangle","rect"]);
}

function getPoints(type){
if(type==="gold") return 50;
if(type==="circle") return 20;
if(type==="square") return 4;
if(type==="triangle") return Math.random()<0.5?2:3;
if(type==="rect") return 2;
return 0;
}

function maybeReflex(){
if(reflex) return;

if(combo===5 && Math.random()<0.35) activateReflex();
if(combo===10 && Math.random()<0.65) activateReflex();
}

function activateReflex(){
reflex=true;
reflexBanner.classList.remove("hidden");

setTimeout(()=>{
reflex=false;
reflexBanner.classList.add("hidden");
},5000);
}

function spawnShape(){
if(!playing) return;

const type=getType();
const el=document.createElement("div");
el.className="shape "+type;

let x=Math.random()*(window.innerWidth-90);
let y=-80;
let speed=(2+Math.random()*2.5)+speedBoost;

if(reflex) speed*=0.55;

el.style.left=x+"px";
el.style.top=y+"px";

game.appendChild(el);

el.onclick=()=>{
if(!playing) return;

if(type==="bomb"){
lives--;
combo=0;
popText("BOOM!",x,y,"#ff3333");
document.body.classList.add("shake");
setTimeout(()=>document.body.classList.remove("shake"),180);
}else{
combo++;
let pts=getPoints(type);
if(reflex) pts*=2;
score+=pts;
popText("+"+pts,x,y,"#00ffff");
maybeReflex();
}

updateUI();
el.remove();

if(lives<=0) endGame();
};

const fall=setInterval(()=>{
if(!document.body.contains(el)){
clearInterval(fall);
return;
}

y+=speed;
el.style.top=y+"px";

if(y>window.innerHeight){
clearInterval(fall);
el.remove();

if(type!=="bomb"){
lives--;
combo=0;
updateUI();
if(lives<=0) endGame();
}
}
},16);
}

function popText(text,x,y,color){
const t=document.createElement("div");
t.className="comboText";
t.textContent=text;
t.style.left=x+"px";
t.style.top=y+"px";
t.style.color=color;
game.appendChild(t);

setTimeout(()=>t.remove(),700);
}

function endGame(){
playing=false;
clearInterval(spawnLoop);
clearInterval(levelLoop);

if(score>best){
best=score;
localStorage.setItem("reflexBest",best);
}

updateUI();

gameover.innerHTML=`
<h1>GAME OVER</h1>
<div class="sub">Score: ${score}</div>
<div class="small">Best: ${best}</div>
<button onclick="startGame()">PLAY AGAIN</button>
`;

gameover.classList.remove("hidden");
menu.classList.add("hidden");
}
</script>

</body>
</html>
