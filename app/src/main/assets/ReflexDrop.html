<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>Reflex Drop GOD MODE</title>

<!--
REFLEX DROP GOD MODE
Single-file premium mobile web game shell
Part 1 / Continuing build required in next message due to size limits
-->

<style>
:root{
--bg1:#05070d;
--bg2:#111827;
--glass:rgba(255,255,255,.08);
--line:rgba(255,255,255,.12);
--txt:#eef6ff;
--muted:#97a5bf;
--cyan:#00eaff;
--green:#00ff9d;
--gold:#ffd95a;
--red:#ff4d6d;
--purple:#a259ff;
--shadow:0 0 30px rgba(0,234,255,.18);
--radius:22px;
--speed:.28s;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

html,body{
width:100%;
height:100%;
overflow:hidden;
font-family:Arial,Helvetica,sans-serif;
background:
radial-gradient(circle at 15% 20%,rgba(0,234,255,.14),transparent 24%),
radial-gradient(circle at 82% 25%,rgba(162,89,255,.12),transparent 22%),
radial-gradient(circle at 50% 80%,rgba(0,255,157,.08),transparent 28%),
linear-gradient(180deg,var(--bg2),var(--bg1));
color:var(--txt);
}

button,input{
font-family:inherit;
outline:none;
border:none;
}

#app{
position:relative;
width:100%;
height:100%;
overflow:hidden;
}

.page{
position:absolute;
inset:0;
padding:18px;
display:none;
overflow-y:auto;
animation:fadeIn .35s ease;
}

.page.active{
display:block;
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(16px)}
to{opacity:1;transform:none}
}

.logo{
font-size:44px;
font-weight:900;
text-align:center;
letter-spacing:2px;
margin-top:16px;
color:var(--cyan);
text-shadow:0 0 18px rgba(0,234,255,.6);
}

.sub{
text-align:center;
color:var(--muted);
margin-top:8px;
margin-bottom:20px;
font-size:18px;
}

.card{
background:var(--glass);
border:1px solid var(--line);
border-radius:var(--radius);
padding:16px;
backdrop-filter:blur(12px);
box-shadow:var(--shadow);
margin-bottom:14px;
}

.row{
display:flex;
gap:12px;
}

.row>*{
flex:1;
}

.input{
width:100%;
padding:15px;
font-size:18px;
border-radius:18px;
background:rgba(255,255,255,.08);
color:#fff;
border:1px solid rgba(255,255,255,.14);
margin-bottom:12px;
}

.btn{
width:100%;
padding:16px;
font-size:22px;
font-weight:900;
border-radius:22px;
cursor:pointer;
background:linear-gradient(90deg,var(--cyan),var(--green));
color:#000;
box-shadow:0 10px 28px rgba(0,255,157,.18);
transition:transform .14s;
margin-bottom:12px;
}

.btn:active{
transform:scale(.97);
}

.btn2{
background:rgba(255,255,255,.08);
color:#fff;
box-shadow:none;
}

.small{
font-size:14px;
color:var(--muted);
text-align:center;
}

.topbar{
display:flex;
gap:10px;
margin-top:8px;
margin-bottom:14px;
}

.pill{
flex:1;
padding:12px;
border-radius:18px;
background:rgba(255,255,255,.08);
text-align:center;
font-weight:700;
}

.sectionTitle{
font-size:30px;
font-weight:900;
margin:8px 0 14px;
color:var(--cyan);
text-shadow:0 0 10px rgba(0,234,255,.4);
}

.grid2{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
}

.tile{
padding:20px 12px;
border-radius:22px;
background:var(--glass);
border:1px solid var(--line);
text-align:center;
font-weight:900;
font-size:20px;
box-shadow:var(--shadow);
}

.coin{
color:var(--gold);
}

#gameWrap{
position:absolute;
inset:0;
display:none;
background:
radial-gradient(circle at 20% 20%,rgba(0,234,255,.08),transparent 22%),
radial-gradient(circle at 80% 20%,rgba(162,89,255,.08),transparent 22%),
linear-gradient(180deg,#10151d,#05070d);
overflow:hidden;
}

#hud{
position:absolute;
top:10px;
left:10px;
right:10px;
display:flex;
gap:8px;
z-index:30;
}

.hudBox{
flex:1;
padding:10px;
text-align:center;
background:rgba(255,255,255,.08);
border-radius:16px;
font-weight:900;
font-size:18px;
}

#arena{
position:absolute;
top:70px;
left:0;
right:0;
bottom:0;
overflow:hidden;
}

.shape{
position:absolute;
border-radius:18px;
box-shadow:0 0 24px currentColor;
}

.circle{
border-radius:50%;
}

.triangle{
width:0!important;
height:0!important;
background:none!important;
border-left:28px solid transparent;
border-right:28px solid transparent;
border-bottom:56px solid var(--purple);
filter:drop-shadow(0 0 14px rgba(162,89,255,.7));
}

#overlay{
position:absolute;
inset:0;
display:none;
justify-content:center;
align-items:center;
background:rgba(0,0,0,.45);
backdrop-filter:blur(8px);
z-index:50;
padding:18px;
}

.modal{
width:100%;
max-width:420px;
}

.rewardDay{
padding:12px;
border-radius:16px;
text-align:center;
font-weight:900;
background:rgba(255,255,255,.07);
}

.rewardDay.claimed{
background:rgba(0,255,157,.16);
}

.badge{
padding:12px;
border-radius:16px;
background:rgba(255,255,255,.08);
font-size:14px;
font-weight:700;
}

.carousel{
display:flex;
gap:12px;
overflow-x:auto;
padding-bottom:4px;
}

.skin{
min-width:150px;
padding:16px;
border-radius:22px;
background:rgba(255,255,255,.08);
border:1px solid var(--line);
text-align:center;
}

.preview{
height:70px;
border-radius:18px;
margin-bottom:12px;
}

.switch{
display:flex;
justify-content:space-between;
align-items:center;
padding:14px 0;
border-bottom:1px solid rgba(255,255,255,.06);
}

.footerSpace{
height:24px;
}

.floatText{
position:absolute;
font-weight:900;
pointer-events:none;
animation:rise .7s forwards;
z-index:40;
}

@keyframes rise{
0%{opacity:1;transform:translateY(0) scale(1)}
100%{opacity:0;transform:translateY(-60px) scale(1.3)}
}

.particle{
position:absolute;
width:8px;
height:8px;
border-radius:50%;
pointer-events:none;
animation:boom .7s forwards linear;
}

@keyframes boom{
from{opacity:1;transform:translate(0,0) scale(1)}
to{opacity:0;transform:translate(var(--x),var(--y)) scale(.2)}
}
</style>
</head>

<body>
<div id="app">

<!-- LOGIN -->
<section class="page active" id="loginPage">
<div class="logo">REFLEX DROP</div>
<div class="sub">God Mode Edition 👑</div>

<div class="card">
<input id="userInput" class="input" placeholder="Username">
<input id="passInput" class="input" placeholder="Password" type="password">
<button class="btn" onclick="login()">LOGIN / REGISTER</button>
<div class="small">Local device accounts • no email needed</div>
</div>
</section>

<!-- HOME -->
<section class="page" id="homePage">
<div class="logo" style="font-size:34px">REFLEX DROP</div>
<div class="sub" id="welcomeText">Welcome</div>

<div class="topbar">
<div class="pill">💰 <span id="coinsTxt">0</span></div>
<div class="pill">🔥 <span id="streakTxt">0</span></div>
<div class="pill">🏆 <span id="bestTxt">0</span></div>
</div>

<button class="btn" onclick="openModes()">PLAY</button>
<button class="btn btn2" onclick="showPage('shopPage')">SHOP</button>
<button class="btn btn2" onclick="showPage('rewardPage')">DAILY REWARD</button>
<button class="btn btn2" onclick="showPage('statsPage')">STATS</button>
<button class="btn btn2" onclick="showPage('achievementPage')">ACHIEVEMENTS</button>
<button class="btn btn2" onclick="showPage('leaderPage')">LEADERBOARD</button>
<button class="btn btn2" onclick="showPage('settingsPage')">SETTINGS</button>
<button class="btn btn2" onclick="logout()">LOGOUT</button>
</section>

<!-- MODES -->
<section class="page" id="modesPage">
<div class="sectionTitle">GAME MODES</div>
<div class="grid2">
<div class="tile" onclick="startGame('Classic')">Classic</div>
<div class="tile" onclick="startGame('Blitz')">Blitz</div>
<div class="tile" onclick="startGame('Zen')">Zen</div>
<div class="tile" onclick="startGame('Chaos')">Chaos</div>
<div class="tile" onclick="startGame('Precision')">Precision</div>
<div class="tile" onclick="startGame('Survival')">Survival</div>
</div>
<div style="margin-top:16px">
<button class="btn btn2" onclick="showPage('homePage')">BACK</button>
</div>
</section>

<!-- SHOP -->
<section class="page" id="shopPage">
<div class="sectionTitle">SHOP</div>
<div class="carousel">
<div class="skin">
<div class="preview" style="background:linear-gradient(90deg,#00eaff,#00ff9d)"></div>
Neon Skin<br><br>
<button class="btn" onclick="buy('neon',100)">100</button>
</div>

<div class="skin">
<div class="preview" style="background:linear-gradient(90deg,#ff7b00,#ff2d55)"></div>
Inferno Skin<br><br>
<button class="btn" onclick="buy('inferno',160)">160</button>
</div>

<div class="skin">
<div class="preview" style="background:linear-gradient(90deg,#a259ff,#ff4dff)"></div>
Ultra Skin<br><br>
<button class="btn" onclick="buy('ultra',220)">220</button>
</div>
</div>

<button class="btn btn2" onclick="showPage('homePage')">BACK</button>
</section>
